<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Dashboard | UDUF Africa - Certificate Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            line-height: 1.5;
        }

        /* Login Container */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e2fb8 0%, #001338 100%);
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-card h2 {
            font-size: 28px;
            color: #1e2fb8;
            margin-bottom: 8px;
        }

        .login-card p {
            color: #666;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1e2fb8;
            box-shadow: 0 0 0 3px rgba(30,47,184,0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #1e2fb8;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1e2fb8;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: #f58220;
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: #fee;
            color: #e74c3c;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-msg {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        /* Dashboard Container */
        .dashboard-container {
            display: none;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, #1e2fb8 0%, #001338 100%);
            color: white;
            padding: 30px 20px;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .sidebar-logo img {
            width: 80px;
            margin: 0 auto 10px;
            border-radius: 12px;
        }

        .sidebar-logo h3 {
            font-size: 18px;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 10px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .sidebar-menu a i {
            width: 22px;
        }

        .logout-btn {
            margin-top: 50px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 20px;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 30px;
            transition: margin-left 0.3s ease;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .top-bar h1 {
            font-size: 24px;
            color: #1e2fb8;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-email {
            color: #666;
            font-size: 14px;
            background: #f0f2f5;
            padding: 6px 12px;
            border-radius: 20px;
        }

        /* Stats Cards */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #1e2fb8;
        }

        /* Toolbar */
        .toolbar {
            background: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #1e2fb8;
            box-shadow: 0 0 0 3px rgba(30,47,184,0.1);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-primary {
            background: #1e2fb8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #1526a0;
            transform: translateY(-1px);
        }

        .btn-success {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-success:hover {
            background: #1b5e20;
            transform: translateY(-1px);
        }

        /* Table */
        .table-wrapper {
            background: white;
            border-radius: 16px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        th {
            text-align: left;
            padding: 16px 20px;
            background: #f8f9fa;
            font-weight: 700;
            color: #1a1a2e;
            border-bottom: 2px solid #eee;
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid #eee;
            color: #333;
        }

        tr:hover {
            background: #fafafa;
        }

        .cert-code {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            background: #f0f2f5;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
            font-size: 0.85rem;
        }

        .empty-row td {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .loading-spinner {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #1e2fb8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            font-size: 14px;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fee;
            border-left: 4px solid #e74c3c;
            color: #c0392b;
        }

        .alert-success {
            background: #e8f5e9;
            border-left: 4px solid #2e7d32;
            color: #1b5e20;
        }

        /* PDF export hidden container */
        #pdf-export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 1200px;
            background: white;
            padding: 40px;
            font-family: 'Inter', sans-serif;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1100;
            display: none;
            animation: fadeInUp 0.3s ease;
        }

        .toast.success { background: #2e7d32; }
        .toast.error { background: #e74c3c; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .menu-toggle {
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 101;
                background: #1e2fb8;
                color: white;
                width: 40px;
                height: 40px;
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            }
            .top-bar {
                margin-top: 50px;
            }
            .stats-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 769px) {
            .menu-toggle {
                display: none;
            }
        }
    </style>
</head>
<body>

<!-- Login Container -->
<div id="loginContainer" class="login-container">
    <div class="login-card">
        <h2><i class="fas fa-shield-alt"></i> Admin Login</h2>
        <p>Enter your credentials to access the certificate manager</p>
        <div id="loginError" class="error-msg"></div>
        <div id="loginSuccess" class="success-msg"></div>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="adminEmail" placeholder="admin@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="adminPassword" placeholder="Enter password">
                <i class="fas fa-eye-slash toggle-password" id="togglePassword"></i>
            </div>
        </div>
        <button class="login-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login to Dashboard</button>
    </div>
</div>

<!-- Dashboard Container -->
<div id="dashboardContainer" class="dashboard-container">
    <div class="menu-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="logo.png" alt="UDUF Africa" onerror="this.style.display='none'">
            <h3>UDUF Africa</h3>
            <p style="font-size: 12px; opacity: 0.7;">Certificate Manager</p>
        </div>
        <ul class="sidebar-menu">
            <li><a href="#" class="active" onclick="loadCertificates(); return false;"><i class="fas fa-certificate"></i> Certificates</a></li>
        </ul>
        <div class="logout-btn">
            <a href="#" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1><i class="fas fa-certificate"></i> Certificate Manager</h1>
            <div class="user-info">
                <span class="user-email" id="userEmailDisplay"></span>
            </div>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <h3>Total Certificates</h3>
                <div class="stat-number" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Last 7 Days</h3>
                <div class="stat-number" id="weeklyCount">0</div>
            </div>
        </div>

        <div id="alertBox" class="alert alert-error"></div>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name, email, or certificate code...">
            </div>
            <div class="action-buttons">
                <button class="btn-primary" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="btn-success" id="exportPdfBtn"><i class="fas fa-file-pdf"></i> Export as PDF</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table id="certTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Course</th>
                        <th>Email</th>
                        <th>Certificate Code</th>
                        <th>Issue Date</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row">
                        <td colspan="5">
                            <div class="loading-spinner">
                                <div class="spinner"></div>
                                <p>Loading certificates...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Hidden container for PDF export -->
<div id="pdf-export-container"></div>

<!-- Toast Notification -->
<div id="toast" class="toast"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyD_m5yTOkHCj42f8zzmpNmg7I6dqtc1vNY",
        authDomain: "udufafrica-project.firebaseapp.com",
        projectId: "udufafrica-project",
        storageBucket: "udufafrica-project.firebasestorage.app",
        messagingSenderId: "1070479742500",
        appId: "1:1070479742500:web:3b77676d5592860d44aab1"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let currentUser = null;
    let allCertificates = [];

    // ========== AUTHENTICATION ==========
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('adminPassword');
        const toggleIcon = document.getElementById('togglePassword');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        }
    }

    document.getElementById('togglePassword').addEventListener('click', togglePasswordVisibility);

    async function login() {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;
        const errorDiv = document.getElementById('loginError');
        const successDiv = document.getElementById('loginSuccess');
        const loginBtn = document.getElementById('loginBtn');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        if (!email || !password) {
            errorDiv.textContent = 'Please enter both email and password';
            errorDiv.style.display = 'block';
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            currentUser = userCredential.user;
            
            successDiv.textContent = 'Login successful! Redirecting...';
            successDiv.style.display = 'block';
            
            sessionStorage.setItem('adminLoggedIn', 'true');
            sessionStorage.setItem('adminEmail', currentUser.email);
            
            setTimeout(() => {
                showDashboard();
            }, 1000);
            
        } catch (error) {
            console.error('Login error:', error);
            let errorMessage = 'Login failed. ';
            switch (error.code) {
                case 'auth/user-not-found':
                    errorMessage += 'User not found. Please contact administrator.';
                    break;
                case 'auth/wrong-password':
                    errorMessage += 'Incorrect password. Please try again.';
                    break;
                case 'auth/invalid-email':
                    errorMessage += 'Invalid email format.';
                    break;
                default:
                    errorMessage += 'Please check your credentials and try again.';
            }
            errorDiv.textContent = errorMessage;
            errorDiv.style.display = 'block';
        } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
        }
    }

    document.getElementById('loginBtn').addEventListener('click', login);

    function showDashboard() {
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('dashboardContainer').style.display = 'block';
        document.getElementById('userEmailDisplay').textContent = currentUser.email;
        loadCertificates();
    }

    async function logout() {
        try {
            await auth.signOut();
            sessionStorage.removeItem('adminLoggedIn');
            sessionStorage.removeItem('adminEmail');
            currentUser = null;
            
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboardContainer').style.display = 'none';
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminPassword').value = '';
            
            showToast('Logged out successfully', 'success');
        } catch (error) {
            console.error('Logout error:', error);
        }
    }

    // ========== CORE FUNCTIONALITY (PRESERVED) ==========
    function formatDate(timestamp) {
        if (!timestamp) return "N/A";
        
        let date;
        if (timestamp.toDate && typeof timestamp.toDate === 'function') {
            date = timestamp.toDate();
        } 
        else if (timestamp.seconds !== undefined) {
            date = new Date(timestamp.seconds * 1000);
        }
        else if (typeof timestamp === 'string') {
            date = new Date(timestamp);
        }
        else if (timestamp instanceof Date) {
            date = timestamp;
        }
        else {
            return "Invalid date";
        }
        
        if (isNaN(date.getTime())) return "Invalid date";
        
        return date.toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'short', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function formatDateForPdf(timestamp) {
        if (!timestamp) return "N/A";
        
        let date;
        if (timestamp.toDate && typeof timestamp.toDate === 'function') {
            date = timestamp.toDate();
        } 
        else if (timestamp.seconds !== undefined) {
            date = new Date(timestamp.seconds * 1000);
        }
        else if (typeof timestamp === 'string') {
            date = new Date(timestamp);
        }
        else if (timestamp instanceof Date) {
            date = timestamp;
        }
        else {
            return "Invalid date";
        }
        
        if (isNaN(date.getTime())) return "Invalid date";
        
        return date.toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric'
        });
    }

    async function loadCertificates() {
        const tableBody = document.getElementById('tableBody');
        
        tableBody.innerHTML = `
            <tr class="empty-row">
                <td colspan="5">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                        <p>Loading certificates...</p>
                    </div>
                 </td>
             </tr>
        `;
        
        try {
            const certificatesRef = db.collection("certificates");
            const q = certificatesRef.orderBy("issuedAt", "desc");
            const querySnapshot = await q.get();
            
            allCertificates = [];
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                allCertificates.push({
                    id: doc.id,
                    name: data.name || "Unknown",
                    course: data.course || "Unknown Course",
                    email: data.email || "No email",
                    code: data.code || "N/A",
                    issuedAt: data.issuedAt || null,
                    rawTimestamp: data.issuedAt
                });
            });
            
            updateStatistics();
            renderTable(allCertificates);
            
        } catch (error) {
            console.error("Error loading certificates:", error);
            tableBody.innerHTML = `
                <tr class="empty-row">
                    <td colspan="5">
                        <div style="color: #e74c3c;">
                            ⚠️ Failed to load certificates: ${error.message}
                        </div>
                      </td>
                  </tr>
            `;
            showAlert("Error loading data: " + error.message, "error");
        }
    }

    function updateStatistics() {
        const total = allCertificates.length;
        document.getElementById('totalCount').innerText = total;
        
        const now = new Date();
        const sevenDaysAgo = new Date();
        sevenDaysAgo.setDate(now.getDate() - 7);
        
        let weeklyCount = 0;
        allCertificates.forEach(cert => {
            let certDate = null;
            if (cert.rawTimestamp) {
                if (cert.rawTimestamp.toDate && typeof cert.rawTimestamp.toDate === 'function') {
                    certDate = cert.rawTimestamp.toDate();
                } else if (cert.rawTimestamp.seconds !== undefined) {
                    certDate = new Date(cert.rawTimestamp.seconds * 1000);
                }
            }
            if (certDate && certDate >= sevenDaysAgo) {
                weeklyCount++;
            }
        });
        
        document.getElementById('weeklyCount').innerText = weeklyCount;
    }

    function renderTable(certificates) {
        const tableBody = document.getElementById('tableBody');
        
        if (!certificates || certificates.length === 0) {
            tableBody.innerHTML = `
                <tr class="empty-row">
                    <td colspan="5">
                        <div>📭 No certificates found matching your search.</div>
                      </td>
                  </tr>
            `;
            return;
        }
        
        let html = '';
        certificates.forEach(cert => {
            let dateStr = formatDate(cert.rawTimestamp);
            
            html += `
                <tr>
                    <td><strong>${escapeHtml(cert.name)}</strong></td>
                    <td>${escapeHtml(cert.course)}</td>
                    <td>${escapeHtml(cert.email)}</td>
                    <td><span class="cert-code">${escapeHtml(cert.code)}</span></td>
                    <td class="date-badge">${dateStr}</td>
                </tr>
            `;
        });
        
        tableBody.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function filterCertificates() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        
        if (searchTerm === '') {
            renderTable(allCertificates);
            return;
        }
        
        const filtered = allCertificates.filter(cert => {
            return cert.name.toLowerCase().includes(searchTerm) ||
                   cert.email.toLowerCase().includes(searchTerm) ||
                   cert.code.toLowerCase().includes(searchTerm) ||
                   cert.course.toLowerCase().includes(searchTerm);
        });
        
        renderTable(filtered);
    }

    function showAlert(message, type = "error") {
        const alertBox = document.getElementById('alertBox');
        alertBox.className = `alert alert-${type} show`;
        alertBox.innerHTML = type === "error" ? `⚠️ ${message}` : `✅ ${message}`;
        
        setTimeout(() => {
            alertBox.classList.remove('show');
        }, 4000);
    }

    async function exportToPDF() {
        if (allCertificates.length === 0) {
            showAlert("No certificate data to export.", "error");
            return;
        }

        showAlert("Generating PDF report...", "success");
        
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        let dataToExport = allCertificates;
        
        if (searchTerm !== '') {
            dataToExport = allCertificates.filter(cert => {
                return cert.name.toLowerCase().includes(searchTerm) ||
                       cert.email.toLowerCase().includes(searchTerm) ||
                       cert.code.toLowerCase().includes(searchTerm) ||
                       cert.course.toLowerCase().includes(searchTerm);
            });
        }
        
        if (dataToExport.length === 0) {
            showAlert("No data matching current filter to export.", "error");
            return;
        }
        
        const exportDate = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        let tableRows = '';
        
        dataToExport.forEach(cert => {
            const dateStr = formatDateForPdf(cert.rawTimestamp);
            tableRows += `
                <tr>
                    <td style="padding: 10px 12px; border: 1px solid #ddd;">${escapeHtml(cert.name)}</td>
                    <td style="padding: 10px 12px; border: 1px solid #ddd;">${escapeHtml(cert.course)}</td>
                    <td style="padding: 10px 12px; border: 1px solid #ddd;">${escapeHtml(cert.email)}</td>
                    <td style="padding: 10px 12px; border: 1px solid #ddd;">${escapeHtml(cert.code)}</td>
                    <td style="padding: 10px 12px; border: 1px solid #ddd;">${dateStr}</td>
                </tr>
            `;
        });
        
        const pdfHtml = `
            <div style="padding: 40px; font-family: 'Inter', sans-serif; background: white;">
                <div style="text-align: center; margin-bottom: 30px; border-bottom: 2px solid #1e2fb8; padding-bottom: 20px;">
                    <h2 style="color: #1e2fb8; font-size: 28px; margin: 0;">UDUF Africa</h2>
                    <p style="color: #666; margin-top: 8px;">Certificate Issuance Report</p>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <p><strong>Generated on:</strong> ${exportDate}</p>
                    <p><strong>Total Certificates:</strong> ${dataToExport.length}</p>
                    ${searchTerm ? `<p><strong>Filter Applied:</strong> "${searchTerm}"</p>` : ''}
                </div>
                
                <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                    <thead>
                        <tr style="background: #f0f2f5;">
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: left; font-weight: 600;">Name</th>
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: left; font-weight: 600;">Course</th>
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: left; font-weight: 600;">Email</th>
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: left; font-weight: 600;">Certificate Code</th>
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: left; font-weight: 600;">Issue Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
                
                <div style="margin-top: 30px; text-align: center; font-size: 12px; color: #999;">
                    <p>© 2026 UDUF Africa — Secure Certificate Portal</p>
                    <p>This is an official report of all certificate issuances.</p>
                </div>
            </div>
        `;
        
        const container = document.getElementById('pdf-export-container');
        container.innerHTML = pdfHtml;
        
        try {
            const element = container.firstElementChild;
            const canvas = await html2canvas(element, {
                scale: 2,
                backgroundColor: '#ffffff',
                logging: false
            });
            
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            
            const imgWidth = 210;
            const pageHeight = 297;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            
            const pdf = new jsPDF('p', 'mm', 'a4');
            let position = 0;
            
            pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
            
            let heightLeft = imgHeight - pageHeight;
            while (heightLeft > 0) {
                position = heightLeft - imgHeight;
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                heightLeft -= pageHeight;
            }
            
            const fileName = `UDUF_Certificate_Report_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.pdf`;
            pdf.save(fileName);
            
            showAlert("PDF report downloaded successfully!", "success");
            showToast("PDF exported successfully", "success");
        } catch (error) {
            console.error("PDF generation error:", error);
            showAlert("Failed to generate PDF: " + error.message, "error");
        } finally {
            container.innerHTML = '';
        }
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type}`;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    // Event Listeners
    document.getElementById('refreshBtn').addEventListener('click', () => {
        loadCertificates();
        showAlert("Refreshing certificate data...", "success");
    });
    
    document.getElementById('searchInput').addEventListener('input', filterCertificates);
    document.getElementById('exportPdfBtn').addEventListener('click', exportToPDF);

    // Auth state observer
    auth.onAuthStateChanged((user) => {
        if (user && sessionStorage.getItem('adminLoggedIn') === 'true') {
            currentUser = user;
            showDashboard();
        } else if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            sessionStorage.removeItem('adminLoggedIn');
            sessionStorage.removeItem('adminEmail');
        }
    });
</script>
</body>
</html>
