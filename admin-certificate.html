<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UDUF Africa — Admin Certificate Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root {
    --blue-dark:  #0D1B6E;
    --blue-mid:   #1A3AAF;
    --blue-light: #2F5FE8;
    --green:      #1E8C45;
    --green-light:#27AE60;
    --orange:     #F07C1A;
    --orange-soft:#FFA94D;
    --bg:         #F0F4FF;
    --surface:    #FFFFFF;
    --text:       #0D1B6E;
    --muted:      #6B7BAD;
    --border:     #C8D4F5;
    --danger:     #E53E3E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .admin-header {
    background: var(--blue-dark);
    padding: 0 32px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 20px rgba(13,27,110,0.3);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-area img {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    background: white;
    padding: 2px;
  }
  .logo-area h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    color: white;
  }
  .logo-area h1 span { color: var(--orange-soft); }
  .admin-badge {
    background: var(--orange);
    padding: 6px 16px;
    border-radius: 30px;
    color: white;
    font-weight: 600;
    font-size: 0.85rem;
  }

  /* Main Container */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 20px 28px;
    box-shadow: 0 2px 12px rgba(13,27,110,0.08);
    border: 1px solid var(--border);
    flex: 1;
    min-width: 180px;
  }
  .stat-card h3 {
    font-size: 0.85rem;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .stat-card .stat-number {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--blue-dark);
  }

  /* Search & Filter */
  .toolbar {
    background: var(--surface);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
  }
  .search-box {
    flex: 1;
    min-width: 250px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .search-box input {
    flex: 1;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    outline: none;
  }
  .search-box input:focus {
    border-color: var(--blue-light);
  }
  .refresh-btn {
    background: var(--blue-dark);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .refresh-btn:hover {
    background: var(--blue-mid);
  }
  .export-btn {
    background: var(--green);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .export-btn:hover {
    background: var(--green-light);
  }

  /* Table */
  .table-wrapper {
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    overflow-x: auto;
    box-shadow: 0 4px 20px rgba(13,27,110,0.05);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 700px;
  }
  th {
    text-align: left;
    padding: 18px 20px;
    background: var(--bg);
    font-weight: 600;
    color: var(--blue-dark);
    border-bottom: 2px solid var(--border);
  }
  td {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  tr:hover {
    background: rgba(47, 95, 232, 0.03);
  }
  .cert-code {
    font-family: 'Courier New', monospace;
    font-weight: 600;
    background: var(--bg);
    padding: 4px 8px;
    border-radius: 6px;
    display: inline-block;
    font-size: 0.85rem;
  }
  .date-badge {
    font-size: 0.85rem;
  }
  .empty-row td {
    text-align: center;
    padding: 60px;
    color: var(--muted);
  }
  .loading-spinner {
    text-align: center;
    padding: 60px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--blue-dark);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Alert */
  .alert {
    padding: 14px 20px;
    border-radius: 12px;
    margin-bottom: 24px;
    display: none;
  }
  .alert.show {
    display: block;
  }
  .alert-error {
    background: #FFF0F0;
    border-left: 4px solid var(--danger);
    color: #C53030;
  }
  .alert-success {
    background: #F0FFF4;
    border-left: 4px solid var(--green);
    color: #276749;
  }

  footer {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 0.8rem;
  }

  /* PDF Export hidden container */
  #pdf-export-container {
    position: absolute;
    left: -9999px;
    top: 0;
    width: 1200px;
    background: white;
    padding: 40px;
    font-family: 'DM Sans', sans-serif;
  }
  .pdf-header {
    text-align: center;
    margin-bottom: 30px;
    border-bottom: 2px solid var(--blue-dark);
    padding-bottom: 20px;
  }
  .pdf-header h2 {
    color: var(--blue-dark);
    font-family: 'Playfair Display', serif;
    font-size: 28px;
  }
  .pdf-header p {
    color: var(--muted);
    margin-top: 8px;
  }
  .pdf-table {
    width: 100%;
    border-collapse: collapse;
  }
  .pdf-table th {
    background: var(--bg);
    padding: 12px;
    border: 1px solid #ddd;
    text-align: left;
  }
  .pdf-table td {
    padding: 10px 12px;
    border: 1px solid #ddd;
  }
  .pdf-footer {
    margin-top: 30px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>

<header class="admin-header">
  <div class="logo-area">
    <img src="logo.png" alt="UDUF Logo" onerror="this.style.display='none'"/>
    <h1>UDUF <span>Africa</span></h1>
  </div>
  <div class="admin-badge">Admin Portal · Certificates</div>
</header>

<main class="container">
  <div id="alertBox" class="alert alert-error"></div>

  <div class="stats-bar">
    <div class="stat-card">
      <h3>Total Certificates</h3>
      <div class="stat-number" id="totalCount">0</div>
    </div>
    <div class="stat-card">
      <h3>Last 7 Days</h3>
      <div class="stat-number" id="weeklyCount">0</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search by name, email, or certificate code..." />
    </div>
    <button class="refresh-btn" id="refreshBtn">⟳ Refresh</button>
    <button class="export-btn" id="exportPdfBtn">📄 Export as PDF</button>
  </div>

  <div class="table-wrapper">
    <table id="certTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Course</th>
          <th>Email</th>
          <th>Certificate Code</th>
          <th>Issue Date</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="empty-row">
          <td colspan="5">
            <div class="loading-spinner">
              <div class="spinner"></div>
              <p>Loading certificates...</p>
            </div>
           </td>
         </tr>
      </tbody>
    </table>
  </div>
</main>

<footer>
  &copy; 2026 <strong>UDUF Africa</strong>. Secure Admin Portal
</footer>

<!-- Hidden container for PDF export -->
<div id="pdf-export-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase Configuration (same as certificate portal)
    const firebaseConfig = {
        apiKey: "AIzaSyD_m5yTOkHCj42f8zzmpNmg7I6dqtc1vNY",
        authDomain: "udufafrica-project.firebaseapp.com",
        projectId: "udufafrica-project",
        storageBucket: "udufafrica-project.firebasestorage.app",
        messagingSenderId: "1070479742500",
        appId: "1:1070479742500:web:3b77676d5592860d44aab1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allCertificates = []; // Store raw data for filtering

    // Helper: Format Firestore timestamp to readable date
    function formatDate(timestamp) {
        if (!timestamp) return "N/A";
        
        // Handle Firestore Timestamp object
        let date;
        if (timestamp.toDate && typeof timestamp.toDate === 'function') {
            date = timestamp.toDate();
        } 
        // Handle seconds/nanoseconds format
        else if (timestamp.seconds !== undefined) {
            date = new Date(timestamp.seconds * 1000);
        }
        // Handle string or regular Date
        else if (typeof timestamp === 'string') {
            date = new Date(timestamp);
        }
        else if (timestamp instanceof Date) {
            date = timestamp;
        }
        else {
            return "Invalid date";
        }
        
        if (isNaN(date.getTime())) return "Invalid date";
        
        return date.toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'short', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    // Format date for PDF (simpler format)
    function formatDateForPdf(timestamp) {
        if (!timestamp) return "N/A";
        
        let date;
        if (timestamp.toDate && typeof timestamp.toDate === 'function') {
            date = timestamp.toDate();
        } 
        else if (timestamp.seconds !== undefined) {
            date = new Date(timestamp.seconds * 1000);
        }
        else if (typeof timestamp === 'string') {
            date = new Date(timestamp);
        }
        else if (timestamp instanceof Date) {
            date = timestamp;
        }
        else {
            return "Invalid date";
        }
        
        if (isNaN(date.getTime())) return "Invalid date";
        
        return date.toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric'
        });
    }

    // Load all certificates from Firestore
    async function loadCertificates() {
        const tableBody = document.getElementById('tableBody');
        const alertBox = document.getElementById('alertBox');
        
        // Show loading state
        tableBody.innerHTML = `
            <tr class="empty-row">
                <td colspan="5">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                        <p>Loading certificates...</p>
                    </div>
                 </td>
             </tr>
        `;
        
        try {
            const certificatesRef = collection(db, "certificates");
            const q = query(certificatesRef, orderBy("issuedAt", "desc"));
            const querySnapshot = await getDocs(q);
            
            allCertificates = [];
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                allCertificates.push({
                    id: doc.id,
                    name: data.name || "Unknown",
                    course: data.course || "Unknown Course",
                    email: data.email || "No email",
                    code: data.code || "N/A",
                    issuedAt: data.issuedAt || null,
                    rawTimestamp: data.issuedAt
                });
            });
            
            // Update statistics
            updateStatistics();
            
            // Render the table
            renderTable(allCertificates);
            
        } catch (error) {
            console.error("Error loading certificates:", error);
            tableBody.innerHTML = `
                <tr class="empty-row">
                    <td colspan="5">
                        <div style="color: var(--danger);">
                            ⚠️ Failed to load certificates: ${error.message}
                        </div>
                     </td>
                 </tr>
            `;
            showAlert("Error loading data: " + error.message, "error");
        }
    }

    // Update statistics counters
    function updateStatistics() {
        const total = allCertificates.length;
        document.getElementById('totalCount').innerText = total;
        
        // Count certificates issued in last 7 days
        const now = new Date();
        const sevenDaysAgo = new Date();
        sevenDaysAgo.setDate(now.getDate() - 7);
        
        let weeklyCount = 0;
        allCertificates.forEach(cert => {
            let certDate = null;
            if (cert.rawTimestamp) {
                if (cert.rawTimestamp.toDate && typeof cert.rawTimestamp.toDate === 'function') {
                    certDate = cert.rawTimestamp.toDate();
                } else if (cert.rawTimestamp.seconds !== undefined) {
                    certDate = new Date(cert.rawTimestamp.seconds * 1000);
                }
            }
            if (certDate && certDate >= sevenDaysAgo) {
                weeklyCount++;
            }
        });
        
        document.getElementById('weeklyCount').innerText = weeklyCount;
    }

    // Render table with given data array
    function renderTable(certificates) {
        const tableBody = document.getElementById('tableBody');
        
        if (!certificates || certificates.length === 0) {
            tableBody.innerHTML = `
                <tr class="empty-row">
                    <td colspan="5">
                        <div>📭 No certificates found matching your search.</div>
                     </td>
                 </tr>
            `;
            return;
        }
        
        let html = '';
        certificates.forEach(cert => {
            // Safely format the date
            let dateStr = formatDate(cert.rawTimestamp);
            
            html += `
                <tr>
                    <td><strong>${escapeHtml(cert.name)}</strong></td>
                    <td>${escapeHtml(cert.course)}</td>
                    <td>${escapeHtml(cert.email)}</td>
                    <td><span class="cert-code">${escapeHtml(cert.code)}</span></td>
                    <td class="date-badge">${dateStr}</td>
                </tr>
            `;
        });
        
        tableBody.innerHTML = html;
    }

    // Simple escape to prevent XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // Filter certificates based on search input
    function filterCertificates() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        
        if (searchTerm === '') {
            renderTable(allCertificates);
            return;
        }
        
        const filtered = allCertificates.filter(cert => {
            return cert.name.toLowerCase().includes(searchTerm) ||
                   cert.email.toLowerCase().includes(searchTerm) ||
                   cert.code.toLowerCase().includes(searchTerm) ||
                   cert.course.toLowerCase().includes(searchTerm);
        });
        
        renderTable(filtered);
    }

    // Show alert message
    function showAlert(message, type = "error") {
        const alertBox = document.getElementById('alertBox');
        alertBox.className = `alert alert-${type} show`;
        alertBox.innerHTML = type === "error" ? `⚠️ ${message}` : `✅ ${message}`;
        
        setTimeout(() => {
            alertBox.classList.remove('show');
        }, 4000);
    }

    // Export to PDF function
    async function exportToPDF() {
        if (allCertificates.length === 0) {
            showAlert("No certificate data to export.", "error");
            return;
        }

        showAlert("Generating PDF report...", "success");
        
        // Get current filter state for export
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        let dataToExport = allCertificates;
        
        if (searchTerm !== '') {
            dataToExport = allCertificates.filter(cert => {
                return cert.name.toLowerCase().includes(searchTerm) ||
                       cert.email.toLowerCase().includes(searchTerm) ||
                       cert.code.toLowerCase().includes(searchTerm) ||
                       cert.course.toLowerCase().includes(searchTerm);
            });
        }
        
        if (dataToExport.length === 0) {
            showAlert("No data matching current filter to export.", "error");
            return;
        }
        
        // Build HTML for PDF
        const exportDate = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        let tableRows = '';
        
        dataToExport.forEach(cert => {
            const dateStr = formatDateForPdf(cert.rawTimestamp);
            tableRows += `
                <tr>
                    <td style="padding: 10px 12px; border: 1px solid #ddd;">${escapeHtml(cert.name)}</td>
                    <td style="padding: 10px 12px; border: 1px solid #ddd;">${escapeHtml(cert.course)}</td>
                    <td style="padding: 10px 12px; border: 1px solid #ddd;">${escapeHtml(cert.email)}</td>
                    <td style="padding: 10px 12px; border: 1px solid #ddd;">${escapeHtml(cert.code)}</td>
                    <td style="padding: 10px 12px; border: 1px solid #ddd;">${dateStr}</td>
                </tr>
            `;
        });
        
        const pdfHtml = `
            <div style="padding: 40px; font-family: 'DM Sans', sans-serif; background: white;">
                <div style="text-align: center; margin-bottom: 30px; border-bottom: 2px solid #0D1B6E; padding-bottom: 20px;">
                    <h2 style="color: #0D1B6E; font-family: 'Playfair Display', serif; font-size: 28px; margin: 0;">UDUF Africa</h2>
                    <p style="color: #6B7BAD; margin-top: 8px;">Certificate Issuance Report</p>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <p><strong>Generated on:</strong> ${exportDate}</p>
                    <p><strong>Total Certificates:</strong> ${dataToExport.length}</p>
                    ${searchTerm ? `<p><strong>Filter Applied:</strong> "${searchTerm}"</p>` : ''}
                </div>
                
                <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                    <thead>
                        <tr style="background: #F0F4FF;">
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: left; font-weight: 600;">Name</th>
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: left; font-weight: 600;">Course</th>
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: left; font-weight: 600;">Email</th>
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: left; font-weight: 600;">Certificate Code</th>
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: left; font-weight: 600;">Issue Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
                
                <div style="margin-top: 30px; text-align: center; font-size: 12px; color: #6B7BAD;">
                    <p>© 2026 UDUF Africa — Secure Certificate Portal</p>
                    <p>This is an official report of all certificate issuances.</p>
                </div>
            </div>
        `;
        
        // Create a temporary container for rendering
        const container = document.getElementById('pdf-export-container');
        container.innerHTML = pdfHtml;
        
        try {
            // Use html2canvas to render the content
            const element = container.firstElementChild;
            const canvas = await html2canvas(element, {
                scale: 2,
                backgroundColor: '#ffffff',
                logging: false
            });
            
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            
            // Calculate dimensions
            const imgWidth = 210; // A4 width in mm
            const pageHeight = 297; // A4 height in mm
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            
            const pdf = new jsPDF('p', 'mm', 'a4');
            let position = 0;
            
            pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
            
            // Add new page if content exceeds one page
            let heightLeft = imgHeight - pageHeight;
            while (heightLeft > 0) {
                position = heightLeft - imgHeight;
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                heightLeft -= pageHeight;
            }
            
            const fileName = `UDUF_Certificate_Report_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.pdf`;
            pdf.save(fileName);
            
            showAlert("PDF report downloaded successfully!", "success");
        } catch (error) {
            console.error("PDF generation error:", error);
            showAlert("Failed to generate PDF: " + error.message, "error");
        } finally {
            // Clear the container
            container.innerHTML = '';
        }
    }

    // Event Listeners
    document.getElementById('refreshBtn').addEventListener('click', () => {
        loadCertificates();
        showAlert("Refreshing certificate data...", "success");
    });
    
    document.getElementById('searchInput').addEventListener('input', filterCertificates);
    
    document.getElementById('exportPdfBtn').addEventListener('click', exportToPDF);
    
    // Initial load
    loadCertificates();
</script>

</body>
</html>
