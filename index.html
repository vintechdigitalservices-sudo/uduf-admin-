<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Speed BG Remover</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.1"></script>

    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        .btn { background: var(--primary); color: white; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; display: inline-block; transition: 0.2s; border: none; margin-top: 10px; }
        .btn:disabled { background: #cbd5e1; cursor: wait; }
        #status { margin: 15px 0; font-size: 0.9rem; color: #64748b; }
        .preview-box { background: #f1f5f9; margin-top: 15px; border-radius: 8px; min-height: 200px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        canvas { max-width: 100%; max-height: 400px; display: block; z-index: 2; }
        /* Checkerboard background for transparency */
        .checker { background-image: conic-gradient(#e2e8f0 90deg, white 90deg 180deg, #e2e8f0 180deg 270deg, white 270deg); background-size: 20px 20px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Instant BG Remover</h2>
    <p id="status">⚡ Initializing AI Engine...</p>
    
    <input type="file" id="imageInput" accept="image/*" disabled>
    <label for="imageInput" class="btn" id="labelBtn">Please Wait...</label>

    <div class="preview-box checker">
        <canvas id="output"></canvas>
    </div>
    
    <a id="download" class="btn" style="background:#16a34a; display:none;">Download PNG</a>
</div>

<script>
    const status = document.getElementById('status');
    const imageInput = document.getElementById('imageInput');
    const labelBtn = document.getElementById('labelBtn');
    const canvas = document.getElementById('output');
    const download = document.getElementById('download');
    let net;

    async function setupAI() {
        // Force WebGL for speed, but fall back to CPU if it's janky
        await tf.setBackend('webgl');
        
        status.innerText = "🛰️ Loading AI Models...";
        net = await bodyPix.load({
            architecture: 'MobileNetV1',
            outputStride: 16,
            multiplier: 0.75,
            quantBytes: 2
        });

        // THE SECRET SACHET: Warm up the model with a fake 1x1 image
        // This forces Chrome to compile shaders NOW, not when you upload.
        status.innerText = "🔥 Priming Engine...";
        const dummy = tf.zeros([100, 100, 3]);
        await net.segmentPerson(dummy);
        dummy.dispose();

        status.innerText = "✅ Ready for Instant Removal";
        labelBtn.innerText = "Upload Image";
        imageInput.disabled = false;
    }

    imageInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            status.innerText = "🚀 Removing Background...";
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');

            // Use tf.tidy to clean up GPU memory instantly
            const segmentation = await tf.tidy(async () => {
                return await net.segmentPerson(img, {
                    internalResolution: 'medium',
                    segmentationThreshold: 0.7
                });
            });

            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            for (let i = 0; i < segmentation.data.length; i++) {
                if (segmentation.data[i] === 0) {
                    data[i * 4 + 3] = 0; // Alpha = 0
                }
            }

            ctx.putImageData(imageData, 0, 0);
            
            download.href = canvas.toDataURL();
            download.download = "no-bg.png";
            download.style.display = "inline-block";
            status.innerText = "Done!";
        };
    });

    setupAI();
</script>

</body>
</html>
