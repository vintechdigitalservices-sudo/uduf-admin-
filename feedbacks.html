<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Dashboard | UDUF Africa - Manage Feedbacks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            line-height: 1.5;
        }

        /* Login Container */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e2fb8 0%, #001338 100%);
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-card h2 {
            font-size: 28px;
            color: #1e2fb8;
            margin-bottom: 8px;
        }

        .login-card p {
            color: #666;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1e2fb8;
            box-shadow: 0 0 0 3px rgba(30,47,184,0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #1e2fb8;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1e2fb8;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: #f58220;
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: #fee;
            color: #e74c3c;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-msg {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        /* Dashboard Container */
        .dashboard-container {
            display: none;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, #1e2fb8 0%, #001338 100%);
            color: white;
            padding: 30px 20px;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .sidebar-logo img {
            width: 80px;
            margin: 0 auto 10px;
            border-radius: 12px;
        }

        .sidebar-logo h3 {
            font-size: 18px;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 10px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .sidebar-menu a i {
            width: 22px;
        }

        .logout-btn {
            margin-top: 50px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 20px;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 30px;
            transition: margin-left 0.3s ease;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .top-bar h1 {
            font-size: 24px;
            color: #1e2fb8;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-email {
            color: #666;
            font-size: 14px;
            background: #f0f2f5;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #1e2fb8;
        }

        /* Filters */
        .filters {
            background: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            font-weight: 600;
            color: #333;
        }

        .filter-group select,
        .filter-group input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
        }

        /* Feedbacks Table */
        .feedbacks-table-container {
            background: white;
            border-radius: 16px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            font-weight: 700;
            color: #333;
        }

        tr:hover {
            background: #fafafa;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-new { background: #fee; color: #e74c3c; }
        .status-read { background: #e3f2fd; color: #1e88e5; }
        .status-replied { background: #e8f5e9; color: #2e7d32; }
        .status-archived { background: #f5f5f5; color: #999; }

        .action-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-view {
            background: #1e2fb8;
            color: white;
        }
        .btn-view:hover { background: #1526a0; }

        .btn-delete { background: #e74c3c; color: white; }
        .btn-delete:hover { background: #c0392b; }

        .status-select {
            padding: 5px 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 12px;
            cursor: pointer;
            background: white;
        }

        .status-select.status-new { border-color: #e74c3c; color: #e74c3c; }
        .status-select.status-read { border-color: #1e88e5; color: #1e88e5; }
        .status-select.status-replied { border-color: #2e7d32; color: #2e7d32; }
        .status-select.status-archived { border-color: #999; color: #999; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .modal-header h3 {
            font-size: 20px;
            color: #1e2fb8;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .feedback-detail p {
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .feedback-detail strong {
            color: #1e2fb8;
        }

        .message-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
        }

        .reply-box {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .reply-box textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            min-height: 100px;
            font-family: inherit;
            margin-bottom: 10px;
        }

        .send-reply-btn {
            background: #f58220;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .send-reply-btn:hover {
            background: #e07a1a;
        }

        /* NEW: Mail To button style - placed next to Send Reply */
        .mail-to-btn {
            background: #1e2fb8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-left: 10px;
            transition: background 0.2s;
        }
        .mail-to-btn:hover {
            background: #0f1f8a;
        }
        .reply-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 5px;
        }

        .sending {
            opacity: 0.7;
            pointer-events: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 8px 14px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:hover {
            background: #f0f2f5;
        }

        .page-btn.active {
            background: #1e2fb8;
            color: white;
            border-color: #1e2fb8;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .menu-toggle {
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 101;
                background: #1e2fb8;
                color: white;
                width: 40px;
                height: 40px;
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            }
            .top-bar {
                margin-top: 50px;
            }
            .stats-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 769px) {
            .menu-toggle {
                display: none;
            }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1100;
            display: none;
            animation: fadeInUp 0.3s ease;
        }

        .toast.success { background: #2e7d32; }
        .toast.error { background: #e74c3c; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<!-- Login Container -->
<div id="loginContainer" class="login-container">
    <div class="login-card">
        <h2><i class="fas fa-shield-alt"></i> Admin Login</h2>
        <p>Enter your credentials to access the feedback dashboard</p>
        <div id="loginError" class="error-msg"></div>
        <div id="loginSuccess" class="success-msg"></div>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="adminEmail" placeholder="admin@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="adminPassword" placeholder="Enter password">
                <i class="fas fa-eye-slash toggle-password" id="togglePassword" onclick="togglePasswordVisibility()"></i>
            </div>
        </div>
        <button class="login-btn" id="loginBtn" onclick="login()"><i class="fas fa-sign-in-alt"></i> Login to Dashboard</button>
    </div>
</div>

<!-- Dashboard Container -->
<div id="dashboardContainer" class="dashboard-container">
    <div class="menu-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="logo.png" alt="UDUF Africa">
            <h3>UDUF Africa</h3>
            <p style="font-size: 12px; opacity: 0.7;">Admin Dashboard</p>
        </div>
        <ul class="sidebar-menu">
            <li><a href="#" class="active" onclick="loadFeedbacks(); return false;"><i class="fas fa-comment-dots"></i> Feedbacks</a></li>
            <li><a href="#" onclick="showStats(); return false;"><i class="fas fa-chart-line"></i> Statistics</a></li>
        </ul>
        <div class="logout-btn">
            <a href="#" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1><i class="fas fa-comment-dots"></i> Feedback Management</h1>
            <div class="user-info">
                <span class="user-email" id="userEmailDisplay"></span>
            </div>
        </div>

        <div class="stats-cards" id="statsCards">
            <div class="stat-card"><h3>Total Feedbacks</h3><div class="stat-number" id="totalCount">0</div></div>
            <div class="stat-card"><h3>New</h3><div class="stat-number" id="newCount">0</div></div>
            <div class="stat-card"><h3>Read</h3><div class="stat-number" id="readCount">0</div></div>
            <div class="stat-card"><h3>Replied</h3><div class="stat-number" id="repliedCount">0</div></div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>Status:</label>
                <select id="statusFilter" onchange="loadFeedbacks()">
                    <option value="all">All</option>
                    <option value="new">New</option>
                    <option value="read">Read</option>
                    <option value="replied">Replied</option>
                    <option value="archived">Archived</option>
                </select>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name, email, or subject..." onkeyup="debouncedSearch()">
            </div>
            <div class="filter-group">
                <label>Sort:</label>
                <select id="sortOrder" onchange="loadFeedbacks()">
                    <option value="desc">Newest First</option>
                    <option value="asc">Oldest First</option>
                </select>
            </div>
        </div>

        <div class="feedbacks-table-container">
            <div id="feedbacksTable">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading feedbacks...</div>
            </div>
        </div>

        <div id="pagination" class="pagination"></div>
    </div>
</div>

<!-- View/Reply Modal -->
<div id="feedbackModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-envelope"></i> Feedback Details</h3>
            <button class="close-modal" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyD_m5yTOkHCj42f8zzmpNmg7I6dqtc1vNY",
        authDomain: "udufafrica-project.firebaseapp.com",
        projectId: "udufafrica-project",
        storageBucket: "udufafrica-project.firebasestorage.app",
        messagingSenderId: "1070479742500",
        appId: "1:1070479742500:web:3b77676d5592860d44aab1"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let currentUser = null;
    let allFeedbacks = [];
    let currentPage = 1;
    const itemsPerPage = 20;
    let searchTimeout;
    let unsubscribeFeedbacks = null;

    // Toggle password visibility
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('adminPassword');
        const toggleIcon = document.getElementById('togglePassword');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        }
    }

    // Login function using Firebase Auth
    async function login() {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;
        const errorDiv = document.getElementById('loginError');
        const successDiv = document.getElementById('loginSuccess');
        const loginBtn = document.getElementById('loginBtn');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        if (!email || !password) {
            errorDiv.textContent = 'Please enter both email and password';
            errorDiv.style.display = 'block';
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            currentUser = userCredential.user;
            
            successDiv.textContent = 'Login successful! Redirecting...';
            successDiv.style.display = 'block';
            
            sessionStorage.setItem('adminLoggedIn', 'true');
            sessionStorage.setItem('adminEmail', currentUser.email);
            
            setTimeout(() => {
                showDashboard();
            }, 1000);
            
        } catch (error) {
            console.error('Login error:', error);
            let errorMessage = 'Login failed. ';
            switch (error.code) {
                case 'auth/user-not-found':
                    errorMessage += 'User not found. Please contact administrator.';
                    break;
                case 'auth/wrong-password':
                    errorMessage += 'Incorrect password. Please try again.';
                    break;
                case 'auth/invalid-email':
                    errorMessage += 'Invalid email format.';
                    break;
                default:
                    errorMessage += 'Please check your credentials and try again.';
            }
            errorDiv.textContent = errorMessage;
            errorDiv.style.display = 'block';
        } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
        }
    }

    // Show dashboard after login
    async function showDashboard() {
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('dashboardContainer').style.display = 'block';
        document.getElementById('userEmailDisplay').textContent = currentUser.email;
        
        await loadFeedbacks();
        
        if (unsubscribeFeedbacks) {
            unsubscribeFeedbacks();
        }
        
        unsubscribeFeedbacks = db.collection('feedbacks')
            .orderBy('createdAt', 'desc')
            .onSnapshot((snapshot) => {
                loadFeedbacks();
            }, (error) => {
                console.error('Snapshot error:', error);
            });
    }

    // Logout function
    async function logout() {
        try {
            await auth.signOut();
            sessionStorage.removeItem('adminLoggedIn');
            sessionStorage.removeItem('adminEmail');
            currentUser = null;
            
            if (unsubscribeFeedbacks) {
                unsubscribeFeedbacks();
                unsubscribeFeedbacks = null;
            }
            
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboardContainer').style.display = 'none';
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminPassword').value = '';
            
            showToast('Logged out successfully', 'success');
        } catch (error) {
            console.error('Logout error:', error);
        }
    }

    // Update feedback status in Firestore
    async function updateFeedbackStatus(id, newStatus) {
        try {
            await db.collection('feedbacks').doc(id).update({ status: newStatus });
            showToast(`Status updated to ${newStatus}`, 'success');
            loadFeedbacks();
        } catch (error) {
            console.error('Error updating status:', error);
            showToast('Error updating status', 'error');
        }
    }

    // Load feedbacks from Firestore
    async function loadFeedbacks() {
        const statusFilter = document.getElementById('statusFilter').value;
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const sortOrder = document.getElementById('sortOrder').value;
        
        document.getElementById('feedbacksTable').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading feedbacks...</div>';
        
        try {
            let query = db.collection('feedbacks');
            let snapshot = await query.get();
            
            let feedbacks = [];
            snapshot.forEach(doc => {
                let data = doc.data();
                feedbacks.push({
                    id: doc.id,
                    ...data,
                    createdAt: data.createdAt ? data.createdAt.toDate() : new Date()
                });
            });
            
            if (statusFilter !== 'all') {
                feedbacks = feedbacks.filter(f => f.status === statusFilter);
            }
            
            if (searchTerm) {
                feedbacks = feedbacks.filter(f => 
                    (f.fullName || '').toLowerCase().includes(searchTerm) ||
                    (f.email || '').toLowerCase().includes(searchTerm) ||
                    (f.subject || '').toLowerCase().includes(searchTerm) ||
                    (f.message || '').toLowerCase().includes(searchTerm) ||
                    (f.phone || '').toLowerCase().includes(searchTerm)
                );
            }
            
            feedbacks.sort((a, b) => {
                if (sortOrder === 'desc') return b.createdAt - a.createdAt;
                return a.createdAt - b.createdAt;
            });
            
            allFeedbacks = feedbacks;
            updateStats(feedbacks);
            renderTable();
            
        } catch (error) {
            console.error('Error loading feedbacks:', error);
            document.getElementById('feedbacksTable').innerHTML = '<div class="loading" style="color: #e74c3c;"><i class="fas fa-exclamation-triangle"></i> Error loading feedbacks. Please refresh.</div>';
        }
    }

    // Update statistics
    function updateStats(feedbacks) {
        const total = feedbacks.length;
        const newCount = feedbacks.filter(f => f.status === 'new').length;
        const readCount = feedbacks.filter(f => f.status === 'read').length;
        const repliedCount = feedbacks.filter(f => f.status === 'replied').length;
        
        document.getElementById('totalCount').textContent = total;
        document.getElementById('newCount').textContent = newCount;
        document.getElementById('readCount').textContent = readCount;
        document.getElementById('repliedCount').textContent = repliedCount;
    }

    // Render table with pagination
    function renderTable() {
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageFeedbacks = allFeedbacks.slice(start, end);
        
        if (pageFeedbacks.length === 0) {
            document.getElementById('feedbacksTable').innerHTML = '<div class="loading"><i class="fas fa-inbox"></i> No feedbacks found</div>';
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        
        let html = `
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Email</th><th>Subject</th><th>Status</th><th>Change Status</th><th>Date</th><th>Actions</th></tr>
                </thead>
                <tbody>
        `;
        
        pageFeedbacks.forEach((feedback, idx) => {
            const date = feedback.createdAt ? feedback.createdAt.toLocaleDateString() : 'N/A';
            const statusClass = `status-${feedback.status || 'new'}`;
            const statusText = feedback.status || 'new';
            
            html += `
                <tr>
                    <td>${start + idx + 1}</td>
                    <td><strong>${escapeHtml(feedback.fullName || 'N/A')}</strong></td>
                    <td>${escapeHtml(feedback.email || 'N/A')}</td>
                    <td>${escapeHtml(feedback.subject || 'N/A')}</td>
                    <td><span class="status-badge ${statusClass}">${statusText.toUpperCase()}</span></td>
                    <td>
                        <select class="status-select ${statusClass}" onchange="updateFeedbackStatus('${feedback.id}', this.value)">
                            <option value="new" ${feedback.status === 'new' ? 'selected' : ''}>New</option>
                            <option value="read" ${feedback.status === 'read' ? 'selected' : ''}>Read</option>
                            <option value="replied" ${feedback.status === 'replied' ? 'selected' : ''}>Replied</option>
                            <option value="archived" ${feedback.status === 'archived' ? 'selected' : ''}>Archived</option>
                        </select>
                    </td>
                    <td>${date}</td>
                    <td class="action-btns">
                        <button class="action-btn btn-view" onclick="viewFeedback('${feedback.id}')"><i class="fas fa-eye"></i> View</button>
                        <button class="action-btn btn-delete" onclick="deleteFeedback('${feedback.id}')"><i class="fas fa-trash"></i> Delete</button>
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        document.getElementById('feedbacksTable').innerHTML = html;
        
        const totalPages = Math.ceil(allFeedbacks.length / itemsPerPage);
        let paginationHtml = '';
        for (let i = 1; i <= totalPages; i++) {
            paginationHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        }
        document.getElementById('pagination').innerHTML = paginationHtml;
    }

    function goToPage(page) {
        currentPage = page;
        renderTable();
    }

    // View single feedback (MODIFIED: added Mail To button alongside Send Reply)
    async function viewFeedback(id) {
        const feedback = allFeedbacks.find(f => f.id === id);
        if (!feedback) return;
        
        const date = feedback.createdAt ? feedback.createdAt.toLocaleString() : 'N/A';
        const safeEmail = escapeHtml(feedback.email || '');
        const safeName = escapeHtml(feedback.fullName || '');
        
        const modalBody = `
            <div class="feedback-detail">
                <p><strong><i class="fas fa-user"></i> Name:</strong> ${safeName}</p>
                <p><strong><i class="fas fa-envelope"></i> Email:</strong> <a href="mailto:${safeEmail}">${safeEmail}</a></p>
                <p><strong><i class="fas fa-phone"></i> Phone:</strong> ${escapeHtml(feedback.phone || 'Not provided')}</p>
                <p><strong><i class="fas fa-tag"></i> Subject:</strong> ${escapeHtml(feedback.subject || 'N/A')}</p>
                <p><strong><i class="fas fa-calendar"></i> Date:</strong> ${date}</p>
                <p><strong><i class="fas fa-comment"></i> Message:</strong></p>
                <div class="message-box">
                    ${escapeHtml(feedback.message || 'No message')}
                </div>
                <div class="reply-box">
                    <label><strong><i class="fas fa-reply"></i> Reply to ${safeName}:</strong></label>
                    <textarea id="replyMessage" placeholder="Type your reply here..."></textarea>
                    <div class="reply-actions">
                        <button class="send-reply-btn" onclick="sendReply('${feedback.id}', '${safeEmail}', '${safeName}')">
                            <i class="fas fa-paper-plane"></i> Send Reply
                        </button>
                        <!-- NEW: Mail To button that opens default email client -->
                        <button class="mail-to-btn" onclick="openMailTo('${safeEmail}', '${safeName}', '${escapeHtml(feedback.subject || 'Feedback')}')">
                            <i class="fas fa-envelope-open-text"></i> Mail To
                        </button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('modalBody').innerHTML = modalBody;
        document.getElementById('feedbackModal').classList.add('active');
    }

    // NEW function: opens system email client with pre-filled recipient, subject and body hint
    function openMailTo(email, name, subjectRaw) {
        if (!email || email === 'N/A') {
            showToast('Recipient email address is missing', 'error');
            return;
        }
        const encodedEmail = encodeURIComponent(email);
        const cleanSubject = `Re: Feedback from ${name} - ${subjectRaw}`;
        const encodedSubject = encodeURIComponent(cleanSubject);
        const bodyHint = encodeURIComponent(`Dear ${name},\n\nThank you for your feedback. Here is our response:\n\n[Write your reply here]\n\nBest regards,\nUDUF Africa Team`);
        window.location.href = `mailto:${encodedEmail}?subject=${encodedSubject}&body=${bodyHint}`;
        showToast('Opening email client...', 'success');
    }

    // Send reply and mark as replied
    async function sendReply(id, email, name) {
        const replyMessage = document.getElementById('replyMessage').value.trim();
        if (!replyMessage) {
            showToast('Please enter a reply message', 'error');
            return;
        }
        
        const sendBtn = document.querySelector('.send-reply-btn');
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
        
        try {
            await db.collection('feedbacks').doc(id).update({ 
                status: 'replied',
                repliedAt: firebase.firestore.FieldValue.serverTimestamp(),
                replyMessage: replyMessage
            });
            
            console.log(`Reply sent to ${email}: ${replyMessage}`);
            
            showToast(`Reply sent to ${name}!`, 'success');
            closeModal();
            loadFeedbacks();
            
        } catch (error) {
            console.error('Error sending reply:', error);
            showToast('Error sending reply. Please try again.', 'error');
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reply';
        }
    }

    // Delete feedback from Firestore
    async function deleteFeedback(id) {
        if (confirm('Are you sure you want to delete this feedback? This action cannot be undone.')) {
            try {
                await db.collection('feedbacks').doc(id).delete();
                showToast('Feedback deleted successfully', 'success');
                loadFeedbacks();
            } catch (error) {
                console.error('Error deleting feedback:', error);
                showToast('Error deleting feedback', 'error');
            }
        }
    }

    // Close modal
    function closeModal() {
        document.getElementById('feedbackModal').classList.remove('active');
    }

    // Show statistics
    function showStats() {
        showToast(`Statistics:\nTotal: ${allFeedbacks.length}\nNew: ${allFeedbacks.filter(f => f.status === 'new').length}\nRead: ${allFeedbacks.filter(f => f.status === 'read').length}\nReplied: ${allFeedbacks.filter(f => f.status === 'replied').length}`, 'success');
    }

    // Toggle sidebar on mobile
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    // Debounced search
    function debouncedSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentPage = 1;
            loadFeedbacks();
        }, 500);
    }

    // Show toast notification
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type}`;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    // Escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Check for existing session
    auth.onAuthStateChanged((user) => {
        if (user && sessionStorage.getItem('adminLoggedIn') === 'true') {
            currentUser = user;
            showDashboard();
        } else if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            sessionStorage.removeItem('adminLoggedIn');
            sessionStorage.removeItem('adminEmail');
        }
    });

    // Close modal on outside click
    window.onclick = function(event) {
        const modal = document.getElementById('feedbackModal');
        if (event.target === modal) {
            closeModal();
        }
    }
</script>
</body>
</html>
